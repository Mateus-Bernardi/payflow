server:
  port: 8081 # Este serviço rodará na porta 8081

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # O Hibernate cria/atualiza as tabelas automaticamente
    show-sql: true # Mostra no console os comandos SQL que o Java está gerando
    properties:
      hibernate:
        format_sql: true

api:
  security:
    token:
      secret: ${JWT_SECRET}
